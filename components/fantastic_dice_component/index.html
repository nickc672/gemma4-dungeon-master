<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fantastic Dice Component</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: transparent;
        color: #f2ebdf;
      }

      .wrap {
        border: 1px solid rgba(237, 228, 211, 0.24);
        border-radius: 12px;
        background: rgba(7, 10, 14, 0.82);
        padding: 8px;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 6px;
      }

      button {
        border: 1px solid rgba(252, 199, 62, 0.4);
        border-radius: 999px;
        padding: 0.35rem 0.8rem;
        background: linear-gradient(140deg, rgba(84, 59, 23, 0.95), rgba(26, 19, 10, 0.95));
        color: #f6efe1;
        font-size: 0.84rem;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      #dice-box-root {
        width: 100%;
        min-height: 260px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="controls">
        <button id="roll-btn" type="button" disabled>Roll the Dice</button>
      </div>
      <div id="dice-box-root"></div>
    </div>

    <script>
      (function () {
        const Streamlit = (function () {
          const API_VERSION = 1;
          const RENDER_EVENT = "streamlit:render";
          const events = new EventTarget();
          let registered = false;
          let lastHeight = -1;

          function send(type, data) {
            window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data || {}), "*");
          }

          function onMessage(event) {
            const data = event && event.data ? event.data : {};
            if (data.type !== RENDER_EVENT) {
              return;
            }
            const detail = {
              args: data.args || {},
              disabled: Boolean(data.disabled),
              theme: data.theme || null,
            };
            events.dispatchEvent(new CustomEvent(RENDER_EVENT, { detail: detail }));
          }

          return {
            API_VERSION: API_VERSION,
            RENDER_EVENT: RENDER_EVENT,
            events: events,
            setComponentReady: function () {
              if (!registered) {
                window.addEventListener("message", onMessage);
                registered = true;
              }
              send("streamlit:componentReady", { apiVersion: API_VERSION });
            },
            setFrameHeight: function (height) {
              const resolved = height == null ? document.body.scrollHeight : Number(height);
              if (!Number.isFinite(resolved) || resolved <= 0 || resolved === lastHeight) {
                return;
              }
              lastHeight = resolved;
              send("streamlit:setFrameHeight", { height: resolved });
            },
            setComponentValue: function (value) {
              send("streamlit:setComponentValue", { value: value, dataType: "json" });
            },
          };
        })();

        const rollBtn = document.getElementById("roll-btn");
        const rootEl = document.getElementById("dice-box-root");
        const wrapEl = document.querySelector(".wrap");

        const state = {
          active: false,
          notation: "1d20",
          rolling: false,
          requestId: "",
          completedRequestId: "",
        };
        let diceBoxPromise = null;

        function setHeight() {
          if (Streamlit && typeof Streamlit.setFrameHeight === "function") {
            const measured = wrapEl ? Math.ceil(wrapEl.getBoundingClientRect().height) : Math.ceil(document.body.scrollHeight);
            Streamlit.setFrameHeight(measured + 6);
          }
        }

        function updateUi() {
          const requestResolved = Boolean(state.requestId) && state.completedRequestId === state.requestId;
          rollBtn.disabled = !state.active || !state.requestId || state.rolling || requestResolved;
          setHeight();
        }

        function clearExistingDiceScene() {
          if (!diceBoxPromise) {
            return;
          }
          void diceBoxPromise
            .then((box) => {
              if (box && typeof box.clear === "function") {
                box.clear();
              }
            })
            .catch(() => {});
        }

        function extractFirstDie(groups) {
          if (!Array.isArray(groups)) {
            return null;
          }
          for (const group of groups) {
            const rolls = Array.isArray(group && group.rolls) ? group.rolls : [];
            for (const die of rolls) {
              const value = die && (die.value ?? die.result);
              if (Number.isInteger(value)) {
                return value;
              }
            }
          }
          return null;
        }

        async function getDiceBox() {
          if (diceBoxPromise) {
            return diceBoxPromise;
          }
          diceBoxPromise = (async function () {
            const module = await import("./dice-box.es.min.js");
            const DiceBoxCtor = module && module.default ? module.default : null;
            if (!DiceBoxCtor) {
              throw new Error("DiceBox module failed to load.");
            }
            const componentBaseUrl = new URL("./", window.location.href).href;
            const box = new DiceBoxCtor({
              assetPath: "assets/",
              origin: componentBaseUrl,
              container: "#dice-box-root",
              scale: 30,
              gravity: 1,
              offscreen: true,
              enableShadows: true,
            });
            await box.init();
            return box;
          })();
          return diceBoxPromise;
        }

        async function handleRollClick() {
          const requestResolved = Boolean(state.requestId) && state.completedRequestId === state.requestId;
          if (!state.active || !state.requestId || state.rolling || requestResolved) {
            return;
          }
          state.rolling = true;
          updateUi();
          try {
            const box = await getDiceBox();
            const rollResult = await box.roll(state.notation || "1d20");
            const d20 = extractFirstDie(rollResult);
            if (!Number.isInteger(d20)) {
              throw new Error("Could not read die result.");
            }
            if (Streamlit && typeof Streamlit.setComponentValue === "function") {
              state.completedRequestId = state.requestId || "__manual__";
              Streamlit.setComponentValue({
                roll_id: Date.now().toString() + "-" + Math.random().toString(16).slice(2),
                request_id: state.requestId || "",
                d20: d20,
              });
            }
          } finally {
            state.rolling = false;
            updateUi();
          }
        }

        function handleRender(event) {
          const args = (event && event.detail && event.detail.args) || {};
          const previousRequestId = state.requestId;
          state.active = Boolean(args.active);
          state.notation = typeof args.notation === "string" && args.notation.trim() ? args.notation.trim() : "1d20";
          state.requestId = typeof args.request_id === "string" ? args.request_id.trim() : "";
          if (!state.active) {
            state.completedRequestId = "";
            clearExistingDiceScene();
          } else if (state.requestId && state.requestId !== previousRequestId) {
            state.completedRequestId = "";
            clearExistingDiceScene();
          }
          updateUi();
        }

        rollBtn.addEventListener("click", handleRollClick);
        Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, handleRender);
        Streamlit.setComponentReady();
        setHeight();
        if (rootEl) {
          setTimeout(setHeight, 100);
        }
      })();
    </script>
  </body>
</html>
